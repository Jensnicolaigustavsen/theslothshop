version: "3.9"

services:
  nord1:
    image: qmcgaw/gluetun:latest
    container_name: nord-1
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=nordvpn
      - VPN_TYPE=openvpn
      - OPENVPN_USER=38WsFoApBRyGiLs3Qjuzj8d3
      - OPENVPN_PASSWORD=En1o8hHjRu2nYsWaJTemEL6r
      - SERVER_COUNTRIES=Spain
      - TZ=Europe/London
      - UPDATER_PERIOD=24h
    ports:
      - "5801:5800"          # Firefox VNC access
    restart: unless-stopped

  firefox1:
    image: jlesage/firefox:latest
    container_name: firefox-1
    network_mode: "service:nord1"
    environment:
      - DISPLAY_WIDTH=1280
      - DISPLAY_HEIGHT=720
      - TZ=Europe/London
      - KEEP_APP_RUNNING=1
    restart: unless-stopped
    depends_on:
      - nord1

